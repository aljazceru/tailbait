name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_FILE != '' }}
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          echo "$KEYSTORE_FILE" | base64 --decode > release-keystore.jks

      - name: Create keystore.properties
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.KEYSTORE_FILE != '' }}
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=../release-keystore.jks
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "name=${INPUT_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK
        env:
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          for apk in app/build/outputs/apk/release/*.apk; do
            filename=$(basename "$apk")
            if [[ "$filename" == *unsigned* ]]; then
              mv "$apk" "app/build/outputs/apk/release/tailbait-${VERSION}-unsigned.apk"
            else
              mv "$apk" "app/build/outputs/apk/release/tailbait-${VERSION}.apk"
            fi
          done

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          draft: true
          generate_release_notes: true

      - name: Build Summary
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.name }}
        run: |
          echo "### Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for apk in app/build/outputs/apk/release/*.apk; do
            if [ -f "$apk" ]; then
              APK_SIZE=$(du -h "$apk" | cut -f1)
              echo "- $(basename "$apk"): ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY
            fi
          done
